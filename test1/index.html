<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InnerJoy Marketing Agent</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    #chat { border: 1px solid #ccc; height: 500px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
    .msg { margin: 8px 0; }
    .msg.user { color: #00008b; }
    .msg.agent { color: #006400; }
    .msg.tool { color: #888; font-style: italic; font-size: 0.9em; }
    #input-row { display: flex; gap: 8px; }
    #user-input { flex: 1; padding: 8px; font-size: 1em; }
    button { padding: 8px 16px; cursor: pointer; }
  </style>
</head>
<body>

<h2>InnerJoy Marketing Agent</h2>

<div id="chat"></div>

<div id="input-row">
  <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter') sendMessage()" />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', 'You: ' + text);
    input.value = '';

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text })
      });

      const data = await response.json();

      // Show tool actions if any
      if (data.tool_actions && data.tool_actions.length > 0) {
        data.tool_actions.forEach(action => {
          addMessage('tool', '⚙️ ' + action);
        });
      }

      // Show agent reply
      if (data.reply) {
        addMessage('agent', 'Agent: ' + data.reply);
      }

    } catch (e) {
      addMessage('tool', 'Error: could not reach server. Is app.py running?');
    }
  }

  function addMessage(type, text) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
</script>

</body>
</html>
